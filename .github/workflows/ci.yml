name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm@9.15.0

      # `prepare` rebuilds dist/ on install; dist/ is committed so git
      # installs work even when the consumer blocks lifecycle scripts.
      - name: Install (runs prepare/build)
        run: pnpm install

      - name: Committed dist/ matches sources
        run: git diff --exit-code dist

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Docker image builds
        run: docker build -t google-drive-api-mock .
