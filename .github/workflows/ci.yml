name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm@9.15.0

      - name: Install
        run: pnpm install

      # dist/ is committed so git-dependency installs are a pure file copy
      # (no lifecycle script runs for a consumer). This repo's own `build`
      # is run explicitly here — never wired to `prepare` — because a
      # `prepare` script forces pnpm to build the package in isolation for
      # every consumer that pulls it as a git dependency, which means
      # installing this repo's own devDependencies from scratch inside that
      # isolated fetch, every time, and can spiral under network flakiness.
      # See CHANGELOG v0.2.1.
      - name: Build
        run: pnpm run build

      - name: Committed dist/ matches sources
        run: git diff --exit-code dist

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests with 100% coverage thresholds
        run: pnpm coverage

      - name: Dependency vulnerability gate
        run: pnpm audit --audit-level=high

      - name: Docker image builds
        run: docker build -t google-drive-api-mock .

  # Publishing is gated on the checks job: a red commit never becomes :latest.
  publish:
    needs: checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
