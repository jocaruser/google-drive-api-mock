name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm@9.15.0

      # `prepare` builds dist/ as part of install, mirroring what happens
      # when a consumer installs this repo as a git dependency.
      - name: Install (runs prepare/build)
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Docker image builds
        run: docker build -t google-drive-api-mock .
